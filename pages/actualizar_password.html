<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://xuuajupcjxmpglatxmqf.supabase.co;">
    <title>Nueva Contraseña - SalvaComida</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="pagina-actualizar-password">
    <nav class="barra-nav">
        <a href="../index.html" class="marca-nav">🥗 SalvaComida</a>
    </nav>
    <div class="contenedor-centrado">
        <div class="tarjeta-formulario tarjeta-angosta">
            <div class="contenido-tarjeta">
                <h2 class="titulo-formulario">🔐 Nueva Contraseña</h2>
                <p class="descripcion-formulario">Escribe tu nueva contraseña. Mínimo 8 caracteres.</p>
                <form id="form-actualizar-password">
                    <div class="campo-grupo">
                        <label for="new-password">Nueva contraseña</label>
                        <div class="input-icono">
                            <span>🔒</span>
                            <input type="password" id="new-password" placeholder="Mínimo 8 caracteres" minlength="8" maxlength="128"
                                required />
                        </div>
                        <div class="error-campo" id="error-new-password"></div>
                    </div>
                    <div class="campo-grupo">
                        <label for="confirm-password">Confirmar contraseña</label>
                        <div class="input-icono">
                            <span>🔒</span>
                            <input type="password" id="confirm-password" placeholder="Repite tu nueva contraseña" minlength="8" maxlength="128"
                                required />
                        </div>
                        <div class="error-campo" id="error-confirm-password"></div>
                    </div>
                    <button type="submit" class="boton boton-primario boton-ancho">💾 Guardar Nueva Contraseña</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/carrito.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>

</html>
