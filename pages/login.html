<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIX #15: Content Security Policy básica para mitigar XSS -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://xuuajupcjxmpglatxmqf.supabase.co;">
    <title>Ingresar - SalvaComida</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body class="pagina-login">
    <nav class="barra-nav">
        <a href="../index.html" class="marca-nav">🥗 SalvaComida</a>
        <ul class="lista-nav-simple">
            <li><a href="../index.html">Inicio</a></li>
        </ul>
    </nav>
    <div class="contenedor-auth">
        <div class="panel-info">
            <div class="icono-grande">🌿</div>
            <h2 class="titulo-auth">Bienvenido de nuevo</h2>
            <p class="descripcion-auth">Tu almuerzo rescatado te está esperando.</p>
            <div class="beneficios-mini">
                <div class="beneficio-mini"><span class="numero-mini">+2k</span>Usuarios</div>
                <div class="beneficio-mini"><span class="numero-mini">70%</span>Ahorro</div>
            </div>
        </div>
        <div class="panel-formulario">
            <div class="tarjeta-formulario">
                <h2 class="titulo-formulario">¡Hola de nuevo!</h2>
                <p class="descripcion-formulario">Ingresa para rescatar tu almuerzo</p>
                <form id="form-login" autocomplete="on">
                    <div class="campo-grupo">
                        <label for="login-email">Correo electrónico</label>
                        <div class="input-icono"><span>✉️</span><input type="email" id="login-email"
                                placeholder="tu@correo.com" autocomplete="email" required /></div>
                    </div>
                    <div class="campo-grupo">
                        <label for="login-password">Contraseña</label>
                        <div class="input-icono"><span>🔒</span><input type="password" id="login-password"
                                placeholder="Tu contraseña" autocomplete="current-password" minlength="8" maxlength="128" required /></div>
                    </div>


                    <button type="submit" id="btn-login" class="boton boton-primario boton-ancho">🔑 Iniciar
                        Sesión</button>
                </form>
                <div class="enlace-recuperar"><a href="recuperar.html" class="enlace-simple">¿Olvidaste tu
                        contraseña?</a></div>
                <a href="registrar.html" class="boton boton-secundario boton-ancho">📝 Crear cuenta gratis</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/carrito.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>

</html>
