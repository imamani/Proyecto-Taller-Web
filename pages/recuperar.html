<head>

<body class="pagina-recuperar">
    <nav class="barra-nav"><a href="../index.html" class="marca-nav">🥗 SalvaComida</a></nav>
    <div class="contenedor-centrado">
        <div class="tarjeta-formulario tarjeta-angosta">
            <div class="contenido-tarjeta">
                <h2 class="titulo-formulario">🔑 Recuperar Contraseña</h2>
                <p class="descripcion-formulario">Ingresa tu correo y te enviaremos un enlace.</p>
                <form id="form-recuperar">
                    <div class="campo-grupo">
                        <label for="rec-email">Correo electrónico</label>
                        <div class="input-icono"><span>✉️</span><input type="email" id="rec-email"
                                placeholder="tu@correo.com" required /></div>
                    </div>

                    <button type="submit" id="btn-login" class="boton boton-primario boton-ancho">✉️ Enviar
                        Enlace</button>
                </form>
                <div class="enlace-recuperar"><a href="login.html" class="enlace-simple">← Volver al login</a></div>
            </div>
        </div>
    </div>
