<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SalvaComida</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="pagina-perfil">
    <nav class="barra-nav"><a href="../index.html" class="marca-nav">🥗 SalvaComida</a></nav>
    <div class="contenedor-cuenta">
        <div class="barra-lateral">
            <div class="avatar-contenedor">
                <div class="avatar">👤</div>
            </div>
            <h3 class="titulo-lateral">Mi Cuenta</h3>
            <div class="menu-lateral">
                <a href="perfil.html" class="enlace-lateral enlace-activo">⚙️ Mis Datos</a>
                <a href="pedidos.html" class="enlace-lateral">📦 Mis Pedidos</a>
                <button id="btn-cerrar-sesion" class="enlace-lateral boton-cerrar-sesion">🚪 Cerrar Sesión</button>
            </div>
        </div>
        <div class="contenido-cuenta">
            <h2 class="titulo-contenido">Mis Datos</h2>
            <form id="form-perfil">
                <div class="campo-grupo">
                    <label for="perf-nombre">Nombre completo</label>
                    <input type="text" id="perf-nombre" placeholder="Tu nombre completo" required />
                </div>
                <div class="campo-grupo">
                    <label for="perf-telefono">Teléfono</label>
                    <input type="tel" id="perf-telefono" placeholder="987654321" required />
                </div>
                <div class="campo-grupo">
                    <label for="perf-direccion">Dirección de entrega</label>
                    <input type="text" id="perf-direccion" placeholder="Av. Principal 123, Arequipa" required />
                </div>
                <button type="submit" class="boton boton-primario">💾 Guardar Cambios</button>
            </form>
        </div>
    </div>
    <div id="aviso-guardado" class="aviso-flotante">✅ ¡Datos guardados correctamente!</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/tienda.js"></script>
</body>

</html>
